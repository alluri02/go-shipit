# GitHub Actions CI/CD Pipeline for go-shipit
#
# KEY GO CONCEPT: CI/CD with GitHub Actions.
# This pipeline runs on every PR and push to main:
#   lint → test → build → (on main only) push Docker image
#
# C# equivalent: Azure Pipelines or GitHub Actions with dotnet CLI
#   - dotnet format --verify-no-changes
#   - dotnet test
#   - dotnet publish
#   - docker build & push
#
# Java equivalent: GitHub Actions with Maven/Gradle
#   - mvn checkstyle:check
#   - mvn test
#   - mvn package
#   - docker build & push

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint — static analysis and formatting
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod  # Use version from go.mod

      # golangci-lint is the standard Go linter (like ESLint, but for Go)
      # C# equivalent: dotnet format --verify-no-changes + Roslyn analyzers
      # Java equivalent: checkstyle + SpotBugs + PMD
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # ─────────────────────────────────────────────
  # Job 2: Test — run all tests with coverage
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Run tests with race detector and coverage
      # -race: detects data races (concurrent access bugs) — Go exclusive feature!
      # -coverprofile: generates coverage report
      #
      # C# equivalent: dotnet test --collect:"XPlat Code Coverage"
      # Java equivalent: mvn test jacoco:report
      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      # Upload coverage to GitHub (visible in PR checks)
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ─────────────────────────────────────────────
  # Job 3: Build — compile binary for multiple OS
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]  # Only build if lint + test pass
    strategy:
      matrix:
        # Cross-compile for multiple platforms
        # Go makes this trivial — just set GOOS and GOARCH
        #
        # C# equivalent: dotnet publish -r win-x64, dotnet publish -r linux-x64
        # Java equivalent: Not native — requires GraalVM native-image per platform
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: darwin
            goarch: arm64
            suffix: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"  # Static binary — no C dependencies
        run: |
          go build -ldflags="-s -w" -o shipit-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} ./cmd/shipit

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: shipit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shipit-*

  # ─────────────────────────────────────────────
  # Job 4: Docker — build and push image (main only)
  # ─────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write  # Push to GitHub Container Registry
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
